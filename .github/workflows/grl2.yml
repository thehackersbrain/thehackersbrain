name: Update README v2 cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_ignored: html, css, javascript, typescript, shell, makefile, dockerfile, astro, scss, mdx, cmake, m4, roff, dart, php, ruby, java, tex
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          filename: profile/metrics.svg

      - name: Debug
        run: |
          ls -la profile/
          git status
          git diff --stat

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/metrics.svg
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Update README cards"
            git push
          fi
